name: Workflow Demo

on: 
  - push

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Create a text file
      run: echo "Hello, world!" >> hello.txt

    - name: Archive text file
      uses: actions/upload-artifact@v4
      with:
        name: hello-artifact
        path: hello.txt
  
  download:
      permissions:
        contents: write
      runs-on: ubuntu-latest
      needs:
        - build
      
      steps:
        - name: Checkout
          uses: actions/checkout@v4

        - name: Get the artifacts
          uses: actions/download-artifact@v4 
          with:
            name: hello-artifact
            path: ./artifacts/

        - name: Display
          run: cat ./artifacts/hello.txt
        
        - name: PushIt
          run: |
            git global -username="rlc200"
            git gloabl -email="rasham.chhetri@gmail.com"
            git add ./artifacts/hello.txt
            git commit -m "artifact"
            git push
